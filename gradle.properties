# Disable buildFeatures flags by default
android.defaults.buildfeatures.resvalues=false
android.defaults.buildfeatures.shaders=false
android.useAndroidX=true
android.enableHiddenApiCheck=false
android.hideApiWarning=false
# Improve build performance by enabling R8 parallelism.
android.r8.maxWorkers=4

kotlin.code.style=official

# Pin to Android Studio's JBR 21. Machine default is Java 25, which makes R8 fail
# in :minify...ReleaseWithR8 ("Compilation failed to complete"). Do not remove.
org.gradle.java.home=/Applications/Android Studio.app/Contents/jbr/Contents/Home
org.gradle.caching=true
org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8 -XX:+UseParallelGC
org.gradle.parallel=true
org.gradle.configuration-cache=true
org.gradle.configuration-cache.parallel=true

# TODO: https://github.com/LawnchairLauncher/lawnchair/pull/6277
android.builtInKotlin=false
android.newDsl=false
